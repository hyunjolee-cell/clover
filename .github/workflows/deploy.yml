name: Deploy CLOVER to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: clover-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate app JavaScript
        run: |
          node --check app.js
          node --check sw.js
          node --check config.js
          node -e "JSON.parse(require('fs').readFileSync('manifest.webmanifest','utf8'))"
          echo 'syntax OK'

      - name: Build site artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html app.js app.css config.js sw.js icon.svg manifest.webmanifest _site/
          cp schema.sql _site/
          touch _site/.nojekyll
          echo '--- deployed files ---'
          ls -l _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
